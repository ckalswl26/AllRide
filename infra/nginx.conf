server {
  listen 80;
  server_name _;
  client_max_body_size 2m;

  location /static/ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    alias /srv/app/static/;
  }

  location /api/health/ {
    proxy_pass http://orai_api;
    proxy_connect_timeout 1s;
    proxy_read_timeout 2s;
  }

  location / {
    proxy_pass http://orai_api;
    proxy_connect_timeout 3s;
    proxy_read_timeout 12s;
  }
}
