services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: orai
      POSTGRES_USER: orai
      POSTGRES_PASSWORD: orai-local
    ports: ["5432:5432"]
    volumes: ["postgres-data:/var/lib/postgresql/data"]
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports: ["6379:6379"]
    volumes: ["redis-data:/data"]
volumes:
  postgres-data:
  redis-data:
